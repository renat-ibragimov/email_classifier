services:
  test_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: email_classifier_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  test_app:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@test_db:5432/email_classifier_test
      OPENAI_API_KEY: sk-test-fake-key-for-testing
    depends_on:
      test_db:
        condition: service_healthy
